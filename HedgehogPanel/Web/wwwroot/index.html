  <style>/* ─── Hedgehog Panel · Redesign ─────────────────────────────────────
   Tokens vary by `data-palette` and `data-density` on <html>.
   Base dark warm-neutral; single accent hue, traffic-light statuses.
   ──────────────────────────────────────────────────────────────── */

:root {
  /* surfaces — warm dark neutral */
  --bg:         oklch(0.155 0.005 80);
  --bg-2:       oklch(0.185 0.005 80);
  --surface:    oklch(0.205 0.005 80);
  --surface-2:  oklch(0.235 0.006 80);
  --surface-3:  oklch(0.275 0.006 80);

  /* borders / lines */
  --line:        oklch(1 0 0 / 0.07);
  --line-strong: oklch(1 0 0 / 0.13);

  /* text */
  --text:        oklch(0.96 0.004 80);
  --text-dim:    oklch(0.74 0.008 80);
  --text-mute:   oklch(0.56 0.008 80);
  --text-faint:  oklch(0.42 0.008 80);

  /* status — traffic light, muted */
  --ok:    oklch(0.74 0.13 150);
  --ok-2:  oklch(0.86 0.10 150);
  --ok-bg: oklch(0.32 0.08 150 / 0.22);

  --warn:    oklch(0.80 0.13 80);
  --warn-2:  oklch(0.90 0.11 85);
  --warn-bg: oklch(0.35 0.09 80 / 0.22);

  --danger:    oklch(0.70 0.17 26);
  --danger-2:  oklch(0.82 0.14 26);
  --danger-bg: oklch(0.32 0.10 26 / 0.24);

  /* accent — overridden by palette */
  --accent:    oklch(0.68 0.12 130);
  --accent-2:  oklch(0.80 0.10 130);
  --accent-bg: oklch(0.32 0.08 130 / 0.25);
  --accent-ring: oklch(0.68 0.12 130 / 0.30);

  /* radii / spacing scale (density-aware) */
  --r-xs: 6px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 14px;
  --r-pill: 999px;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  --row-pad-y: 14px;
  --row-pad-x: 16px;
  --card-pad:  20px;

  --sidebar-w: 232px;
  --topbar-h:  56px;

  --shadow-1: 0 1px 2px rgba(0,0,0,.30);
  --shadow-2: 0 8px 24px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.02) inset;
  --shadow-pop: 0 18px 50px rgba(0,0,0,.55), 0 0 0 1px var(--line);

  --font-ui:   "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

/* ── Palette directions ─────────────────────────────────────────── */

html[data-palette="forest"] {
  --accent:      oklch(0.70 0.13 142);
  --accent-2:    oklch(0.84 0.11 142);
  --accent-bg:   oklch(0.32 0.08 142 / 0.28);
  --accent-ring: oklch(0.70 0.13 142 / 0.30);
}
html[data-palette="cobalt"] {
  --accent:      oklch(0.66 0.17 252);
  --accent-2:    oklch(0.80 0.13 252);
  --accent-bg:   oklch(0.30 0.10 252 / 0.32);
  --accent-ring: oklch(0.66 0.17 252 / 0.30);
}
html[data-palette="ember"] {
  --accent:      oklch(0.68 0.16 38);
  --accent-2:    oklch(0.82 0.13 38);
  --accent-bg:   oklch(0.32 0.10 38 / 0.30);
  --accent-ring: oklch(0.68 0.16 38 / 0.32);
}
html[data-palette="violet"] {
  --accent:      oklch(0.68 0.17 300);
  --accent-2:    oklch(0.82 0.13 300);
  --accent-bg:   oklch(0.32 0.11 300 / 0.30);
  --accent-ring: oklch(0.68 0.17 300 / 0.32);
}

/* ── Density ─────────────────────────────────────────────────────── */

html[data-density="compact"] {
  --row-pad-y: 9px;
  --row-pad-x: 12px;
  --card-pad:  14px;
  --topbar-h:  48px;
}

/* ── Reset / base ────────────────────────────────────────────────── */

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--accent-bg); color: var(--text); }

/* ── App shell ───────────────────────────────────────────────────── */

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
  background:
    radial-gradient(1100px 500px at 0% -20%, var(--accent-bg), transparent 55%),
    radial-gradient(900px 400px at 100% -10%, oklch(1 0 0 / 0.025), transparent 55%),
    var(--bg);
}
.app[data-sidebar="icons"] { grid-template-columns: 60px 1fr; }
.app[data-sidebar="hidden"] { grid-template-columns: 1fr; }

/* ── Sidebar ─────────────────────────────────────────────────────── */

.sidebar {
  position: sticky; top: 0;
  height: 100vh;
  display: flex; flex-direction: column;
  background: linear-gradient(180deg, var(--bg-2), var(--bg));
  border-right: 1px solid var(--line);
  z-index: 5;
}
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  height: var(--topbar-h);
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
}
.brand-mark {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(160deg, var(--accent-2), var(--accent));
  display: grid; place-items: center;
  color: oklch(0.12 0.01 80);
  font-weight: 800; font-size: 13px;
  box-shadow: 0 1px 0 rgba(255,255,255,.25) inset, 0 0 0 1px oklch(0 0 0 / 0.25);
  flex-shrink: 0;
}
.brand-name {
  font-weight: 700;
  letter-spacing: -0.01em;
  font-size: 14.5px;
  white-space: nowrap;
  overflow: hidden;
}
.brand-name small {
  display: block;
  font-weight: 500;
  font-size: 10.5px;
  color: var(--text-mute);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.sb-nav { flex: 1; overflow-y: auto; padding: 14px 10px 14px; }
.sb-group { margin-top: 10px; }
.sb-group:first-child { margin-top: 0; }
.sb-heading {
  font-size: 10.5px; letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 10px 10px 6px;
  font-weight: 600;
}
.sb-item {
  display: flex; align-items: center; gap: 11px;
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid transparent;
  transition: background .12s, color .12s, border-color .12s;
  text-align: left;
  position: relative;
}
.sb-item .ico { color: var(--text-mute); flex-shrink: 0; }
.sb-item:hover { background: var(--surface); color: var(--text); }
.sb-item:hover .ico { color: var(--text); }
.sb-item.active {
  background: var(--surface);
  color: var(--text);
  border-color: var(--line-strong);
}
.sb-item.active::before {
  content: "";
  position: absolute; left: -10px; top: 8px; bottom: 8px;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--accent);
}
.sb-item.active .ico { color: var(--accent-2); }
.sb-item .badge {
  margin-left: auto;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--text-dim);
}
.sb-item.active .badge { background: var(--accent-bg); color: var(--accent-2); }

.app[data-sidebar="icons"] .brand-name,
.app[data-sidebar="icons"] .sb-item span:not(.badge):not(.ico),
.app[data-sidebar="icons"] .sb-heading,
.app[data-sidebar="icons"] .sb-foot-text { display: none; }
.app[data-sidebar="icons"] .sb-item { justify-content: center; padding: 9px; }
.app[data-sidebar="icons"] .sb-item.active::before { display: none; }
.app[data-sidebar="icons"] .sb-brand { justify-content: center; padding: 0; }
.app[data-sidebar="icons"] .sb-foot { padding: 8px; }
.app[data-sidebar="icons"] .sb-foot-row { justify-content: center; }
.app[data-sidebar="icons"] .sb-item .badge { display: none; }

.sb-foot {
  border-top: 1px solid var(--line);
  padding: 12px 12px;
  font-size: 11.5px;
  color: var(--text-mute);
}
.sb-foot-row { display: flex; align-items: center; gap: 8px; }
.sb-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ok); box-shadow: 0 0 8px var(--ok);
}

/* ── Topbar ──────────────────────────────────────────────────────── */

.topbar {
  height: var(--topbar-h);
  display: flex; align-items: center;
  gap: 12px;
  padding: 0 22px;
  border-bottom: 1px solid var(--line);
  background: oklch(0.18 0.005 80 / 0.7);
  backdrop-filter: blur(12px);
  position: sticky; top: 0;
  z-index: 4;
}
.topbar-title {
  font-weight: 600;
  font-size: 14px;
  display: flex; align-items: center; gap: 8px;
  color: var(--text);
}
.topbar-title .crumb {
  color: var(--text-mute);
  font-weight: 500;
}
.topbar-title .sep {
  color: var(--text-faint);
}
.topbar-spacer { flex: 1; }
.topbar .search {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text-dim);
  font-size: 12.5px;
  min-width: 240px;
  transition: border-color .12s, background .12s;
}
.topbar .search:hover { border-color: var(--line-strong); }
.topbar .search input {
  background: transparent; border: 0; outline: 0;
  flex: 1; min-width: 0;
}
.topbar .search kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  color: var(--text-mute);
}
.icon-btn {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--text-dim);
  transition: background .12s, color .12s, border-color .12s;
  position: relative;
}
.icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--line); }
.icon-btn .dot {
  position: absolute; top: 7px; right: 8px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 0 2px oklch(0.18 0.005 80);
}
.user-chip {
  display: flex; align-items: center; gap: 9px;
  padding: 4px 10px 4px 4px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--line);
  transition: border-color .12s, background .12s;
}
.user-chip:hover { border-color: var(--line-strong); background: var(--surface-2); }
.user-chip .avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(160deg, var(--accent-2), var(--accent));
  color: oklch(0.12 0.01 80);
  display: grid; place-items: center;
  font-weight: 700; font-size: 11px;
}
.user-chip .name { font-weight: 500; font-size: 13px; color: var(--text); }
.user-chip .role { font-size: 11px; color: var(--text-mute); }

/* ── Page frame ──────────────────────────────────────────────────── */

.page { padding: 24px 28px 60px; max-width: 1400px; margin: 0 auto; }
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.page-head h1 {
  margin: 0 0 4px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.page-head .lede {
  color: var(--text-mute);
  font-size: 13.5px;
  margin: 0;
  max-width: 60ch;
}
.page-actions { display: flex; gap: 8px; }

/* ── Buttons ─────────────────────────────────────────────────────── */

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 13px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  font-weight: 500;
  font-size: 13px;
  transition: background .12s, border-color .12s, transform .08s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-2); border-color: var(--line-strong); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--accent);
  color: oklch(0.14 0.02 80);
  border-color: oklch(0 0 0 / 0.25);
  font-weight: 600;
}
.btn.primary:hover { background: var(--accent-2); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
.btn.ghost:hover { background: var(--surface); color: var(--text); }
.btn.danger { color: var(--danger-2); }
.btn.danger:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger-2); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn[disabled] { opacity: .5; cursor: not-allowed; }

/* ── Cards ───────────────────────────────────────────────────────── */

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--card-pad);
}
.card.flush { padding: 0; overflow: hidden; }
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  gap: 12px;
}
.card-head h3 { margin: 0; font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
.card-head .sub { color: var(--text-mute); font-size: 12px; }
.card-body { padding: 16px; }

/* ── Tags / pills ─────────────────────────────────────────────────── */

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--surface-2);
  color: var(--text-dim);
  border: 1px solid var(--line);
  white-space: nowrap;
}
.pill .ldot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 6px currentColor;
}
.pill.ok     { color: var(--ok-2);     background: var(--ok-bg);     border-color: oklch(0.6 0.1 150 / 0.4); }
.pill.warn   { color: var(--warn-2);   background: var(--warn-bg);   border-color: oklch(0.6 0.1 80 / 0.4); }
.pill.danger { color: var(--danger-2); background: var(--danger-bg); border-color: oklch(0.6 0.15 26 / 0.4); }
.pill.accent { color: var(--accent-2); background: var(--accent-bg); border-color: oklch(0.6 0.1 var(--accent-h, 142) / 0.4); }
.pill.mono   { font-family: var(--font-mono); font-size: 11px; padding: 1px 8px; }

/* ── Tables ──────────────────────────────────────────────────────── */

.table { width: 100%; border-collapse: collapse; }
.table th, .table td { text-align: left; padding: var(--row-pad-y) var(--row-pad-x); }
.table th {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-mute);
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  position: sticky; top: var(--topbar-h);
  z-index: 1;
}
.table tbody tr { border-bottom: 1px solid var(--line); }
.table tbody tr:last-child { border-bottom: 0; }
.table tbody tr:hover { background: var(--surface-2); }
.table td { font-size: 13px; vertical-align: middle; }
.table td.num, .table td.mono { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-dim); }
.table td .stack { display: flex; flex-direction: column; gap: 1px; }
.table td .stack .sub { font-size: 11.5px; color: var(--text-mute); }
.table td.actions { text-align: right; white-space: nowrap; }

/* ── Form ───────────────────────────────────────────────────────── */

.field { display: flex; flex-direction: column; gap: 6px; }
.field label, .label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}
.input, .select, textarea.input {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 9px 11px;
  border-radius: 8px;
  outline: none;
  transition: border-color .12s, box-shadow .12s, background .12s;
  font-size: 13px;
  width: 100%;
}
.input:hover, .select:hover, textarea.input:hover { border-color: var(--line-strong); }
.input:focus, .select:focus, textarea.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
}
.input::placeholder { color: var(--text-faint); }
.field .help { font-size: 11.5px; color: var(--text-mute); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-grid .full { grid-column: 1 / -1; }
@media (max-width: 720px) { .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } }

/* ── Grid utilities ─────────────────────────────────────────────── */

.grid { display: grid; gap: 14px; }
.grid.cols-2 { grid-template-columns: 1fr 1fr; }
.grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.grid.kpi { grid-template-columns: repeat(4, 1fr); gap: 12px; }
.grid.dash { grid-template-columns: 1.4fr 1fr; }
@media (max-width: 1080px) {
  .grid.cols-3, .grid.cols-4, .grid.kpi { grid-template-columns: repeat(2, 1fr); }
  .grid.dash { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .grid.cols-2, .grid.cols-3, .grid.cols-4, .grid.kpi { grid-template-columns: 1fr; }
}

/* ── KPI card ────────────────────────────────────────────────────── */

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
  overflow: hidden;
}
.kpi-card .label {
  font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-mute); font-weight: 600;
}
.kpi-card .value {
  font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  font-feature-settings: "tnum" 1;
  display: flex; align-items: baseline; gap: 8px;
}
.kpi-card .value .unit { font-size: 13px; color: var(--text-mute); font-weight: 500; }
.kpi-card .delta { font-size: 11.5px; color: var(--text-mute); display: flex; align-items: center; gap: 5px; }
.kpi-card .delta.up { color: var(--ok-2); }
.kpi-card .delta.down { color: var(--danger-2); }

/* ── Server card (grid view) ─────────────────────────────────────── */

.server-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color .12s, transform .08s, background .12s;
  cursor: pointer;
  text-align: left;
}
.server-card:hover { border-color: var(--line-strong); background: var(--surface-2); }
.server-card .row { display: flex; align-items: center; gap: 10px; }
.server-card .row.head { justify-content: space-between; }
.server-card .name { font-weight: 600; font-size: 14px; }
.server-card .host { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-mute); }
.server-card .meter {
  height: 5px; background: var(--bg-2);
  border-radius: 999px; overflow: hidden; flex: 1;
}
.server-card .meter > i {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
}
.server-card .meter.warn > i { background: linear-gradient(90deg, var(--warn), var(--warn-2)); }
.server-card .meter.danger > i { background: linear-gradient(90deg, var(--danger), var(--danger-2)); }
.server-card .stat-line {
  display: grid; grid-template-columns: 50px 1fr 40px;
  gap: 10px; align-items: center;
  font-size: 11.5px; color: var(--text-mute);
}
.server-card .stat-line .val { text-align: right; font-family: var(--font-mono); color: var(--text); }

/* ── Activity feed ───────────────────────────────────────────────── */

.activity { display: flex; flex-direction: column; }
.activity-item {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 10px; padding: 11px 0;
  border-bottom: 1px dashed var(--line);
  align-items: flex-start;
}
.activity-item:last-child { border-bottom: 0; }
.activity-item .dot {
  width: 22px; height: 22px; border-radius: 6px;
  display: grid; place-items: center;
  background: var(--surface-2);
  color: var(--text-dim);
  margin-top: 1px;
}
.activity-item .dot.ok { background: var(--ok-bg); color: var(--ok-2); }
.activity-item .dot.warn { background: var(--warn-bg); color: var(--warn-2); }
.activity-item .dot.danger { background: var(--danger-bg); color: var(--danger-2); }
.activity-item .body { font-size: 13px; }
.activity-item .body .who { font-weight: 600; }
.activity-item .body .meta { font-size: 11.5px; color: var(--text-mute); margin-top: 1px; font-family: var(--font-mono); }
.activity-item .time { font-size: 11.5px; color: var(--text-mute); white-space: nowrap; padding-top: 3px; }

/* ── Toolbar (above tables) ─────────────────────────────────────── */

.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
}
.toolbar .seg {
  display: inline-flex; background: var(--bg-2);
  border: 1px solid var(--line); border-radius: 8px;
  padding: 2px;
}
.seg button {
  padding: 5px 10px;
  background: transparent;
  border: 0; border-radius: 6px;
  color: var(--text-dim); font-size: 12px;
  display: inline-flex; align-items: center; gap: 6px;
}
.seg button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.3); }
.toolbar .spacer { flex: 1; }
.toolbar .field { flex: 1; max-width: 320px; }
.toolbar .input { padding: 6px 10px; font-size: 12.5px; }

/* ── Service rows ────────────────────────────────────────────────── */

.svc-row {
  display: grid;
  grid-template-columns: 28px 1fr 100px 110px auto;
  gap: 14px; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}
.svc-row:last-child { border-bottom: 0; }
.svc-row:hover { background: var(--surface-2); }
.svc-row .ico {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 7px;
  background: var(--surface-2);
  color: var(--text-dim);
}
.svc-row .name { font-weight: 500; }
.svc-row .sub { font-size: 11.5px; color: var(--text-mute); margin-top: 1px; font-family: var(--font-mono); }
.svc-row .actions { display: flex; gap: 6px; justify-content: flex-end; }

/* ── Tabs ────────────────────────────────────────────────────────── */

.tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 18px;
  overflow-x: auto;
  overflow-y: hidden;
}
.tab {
  background: transparent; border: 0;
  padding: 10px 14px;
  color: var(--text-mute);
  font-size: 13px; font-weight: 500;
  position: relative;
  white-space: nowrap;
  border-radius: 0;
  transition: color .12s;
}
.tab:hover { color: var(--text); }
.tab.on { color: var(--text); }
.tab.on::after {
  content: ""; position: absolute; left: 10px; right: 10px; bottom: -1px;
  height: 2px; border-radius: 2px;
  background: var(--accent);
}

/* ── Detail header ───────────────────────────────────────────────── */

.detail-head {
  display: flex; gap: 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 18px 20px;
  margin-bottom: 18px;
  align-items: flex-start;
}
.detail-head .id {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: linear-gradient(160deg, var(--accent-2), var(--accent));
  color: oklch(0.14 0.02 80);
  display: grid; place-items: center;
  font-weight: 800; font-size: 18px;
  flex-shrink: 0;
}
.detail-head h2 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.015em; }
.detail-head .meta { color: var(--text-mute); font-size: 12.5px; margin-top: 3px; }
.detail-head .meta span + span::before { content: "·"; margin: 0 8px; color: var(--text-faint); }
.detail-head .actions { margin-left: auto; display: flex; gap: 8px; }

/* ── Mini sparkline placeholder ──────────────────────────────────── */

.spark {
  position: relative;
  height: 36px;
  width: 100%;
  background:
    linear-gradient(180deg, var(--accent-bg) 0%, transparent 80%);
  border-radius: 6px;
  overflow: hidden;
}
.spark svg { width: 100%; height: 100%; }

/* ── Login ───────────────────────────────────────────────────────── */

.login-stage {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  background: var(--bg);
}
@media (max-width: 880px) { .login-stage { grid-template-columns: 1fr; } }

.login-poster {
  position: relative;
  padding: 36px;
  display: flex; flex-direction: column; justify-content: space-between;
  background:
    radial-gradient(700px 400px at 25% 30%, var(--accent-bg), transparent 60%),
    radial-gradient(500px 360px at 80% 80%, oklch(0.4 0.05 80 / 0.3), transparent 60%),
    linear-gradient(160deg, var(--bg-2), var(--bg));
  border-right: 1px solid var(--line);
  overflow: hidden;
}
.login-poster::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(600px 500px at 30% 40%, #000, transparent 70%);
  opacity: 0.6;
}
.login-poster > * { position: relative; z-index: 1; }
@media (max-width: 880px) { .login-poster { display: none; } }

.poster-head { display: flex; align-items: center; gap: 10px; }
.poster-head .brand-mark { width: 32px; height: 32px; border-radius: 9px; font-size: 14px; }
.poster-head h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }

.poster-body { max-width: 460px; margin-top: 80px; }
.poster-body h2 {
  font-size: 38px; line-height: 1.08; font-weight: 700;
  letter-spacing: -0.03em; margin: 0 0 18px;
}
.poster-body h2 em {
  font-style: normal;
  background: linear-gradient(120deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.poster-body p { color: var(--text-dim); font-size: 14.5px; line-height: 1.55; }

.poster-bullets {
  margin-top: 28px;
  display: grid; gap: 12px;
}
.poster-bullets li {
  list-style: none;
  display: flex; gap: 10px; align-items: flex-start;
  font-size: 13px; color: var(--text-dim);
}
.poster-bullets .b-ico {
  width: 24px; height: 24px; border-radius: 7px;
  display: grid; place-items: center;
  background: var(--accent-bg); color: var(--accent-2);
  flex-shrink: 0;
}
.poster-foot {
  font-size: 12px; color: var(--text-mute);
  font-family: var(--font-mono);
  display: flex; gap: 12px; align-items: center;
}

.login-form-wrap {
  display: grid; place-items: center;
  padding: 40px 24px;
}
.login-card {
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 18px;
}
.login-card h3 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.015em; }
.login-card .sub { color: var(--text-mute); font-size: 13.5px; margin-top: -10px; }
.login-card form { display: flex; flex-direction: column; gap: 12px; }
.login-card .btn.primary { padding: 11px 14px; justify-content: center; }
.login-card .row-line {
  display: flex; align-items: center; gap: 10px;
  color: var(--text-mute); font-size: 12px;
}
.login-card .row-line::before, .login-card .row-line::after {
  content: ""; flex: 1; height: 1px; background: var(--line);
}
.login-card .ext-help {
  font-size: 12px; color: var(--text-mute); text-align: center;
  border: 1px dashed var(--line);
  border-radius: 8px;
  padding: 10px 12px;
}
.login-card .ext-help code {
  font-family: var(--font-mono);
  color: var(--text-dim);
  background: var(--surface);
  padding: 1px 5px; border-radius: 4px;
}

/* ── Note (success/info/danger inline) ───────────────────────────── */

.note {
  font-size: 12.5px;
  padding: 9px 12px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  color: var(--text-dim);
}
.note.success { background: var(--ok-bg); border-color: oklch(0.6 0.1 150 / 0.4); color: var(--ok-2); }
.note.danger  { background: var(--danger-bg); border-color: oklch(0.6 0.15 26 / 0.4); color: var(--danger-2); }
.note.warn    { background: var(--warn-bg); border-color: oklch(0.6 0.1 80 / 0.4); color: var(--warn-2); }

/* ── Floating tweaks panel offset (so it never collides) ────────── */
.tweaks-bubble, .tweaks-panel { font-family: var(--font-ui); }

/* ── Sidebar collapse button ──────────────────────────────────── */

.sb-toggle {
  position: absolute;
  top: 18px;
  right: 10px;
  width: 22px;
  height: 22px;
  display: grid; place-items: center;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--text-mute);
  border-radius: 6px;
  transition: background .12s, color .12s, border-color .12s;
  z-index: 6;
}
.sb-toggle:hover {
  background: var(--surface-2);
  color: var(--text);
  border-color: var(--line-strong);
}
.app[data-sidebar="icons"] .sb-toggle {
  right: 50%;
  top: 70px;
  transform: translateX(50%);
}

/* ── Modal ─────────────────────────────────────────────────────── */

.modal-overlay {
  position: fixed; inset: 0;
  background: oklch(0 0 0 / 0.55);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  z-index: 1000;
  padding: 24px;
  animation: modal-fade .15s ease;
}
@keyframes modal-fade { from { opacity: 0 } to { opacity: 1 } }

.modal {
  background: var(--surface);
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  max-height: calc(100vh - 48px);
  display: flex; flex-direction: column;
  box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 1px oklch(1 0 0 / 0.04);
  animation: modal-rise .18s cubic-bezier(.2,.8,.2,1);
  overflow: hidden;
}
.modal-lg { max-width: 640px; }
.modal-sm { max-width: 380px; }
@keyframes modal-rise {
  from { opacity: 0; transform: translateY(8px) scale(.98); }
  to   { opacity: 1; transform: translateY(0)   scale(1);   }
}

.modal-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 14px;
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.modal-lede { margin-top: 5px; color: var(--text-mute); font-size: 12.5px; line-height: 1.5; }

.modal-body {
  padding: 18px 20px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
}
.modal-foot {
  border-top: 1px solid var(--line);
  padding: 12px 16px;
  display: flex; justify-content: flex-end; gap: 8px;
  background: oklch(0.20 0.005 80 / 0.5);
}

/* ── Soft coming-soon card ────────────────────────────────────── */

.coming-soon {
  display: flex; gap: 14px;
  padding: 16px;
  background: var(--accent-bg);
  border: 1px solid oklch(0.5 0.08 var(--accent-h, 142) / 0.35);
  border-radius: 10px;
  align-items: flex-start;
  margin-bottom: 4px;
}
.coming-soon .ico {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--accent);
  color: oklch(0.14 0.02 80);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.coming-soon strong { display: block; color: var(--text); font-size: 13.5px; margin-bottom: 4px; }
.coming-soon p { margin: 0; color: var(--text-dim); font-size: 12.5px; line-height: 1.55; }

/* ── Permission matrix ────────────────────────────────────────── */

.perm-matrix {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.perm-matrix th, .perm-matrix td {
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1px solid var(--line);
}
.perm-matrix th {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-mute);
  background: var(--surface);
  position: sticky; top: var(--topbar-h);
  white-space: nowrap;
  z-index: 1;
}
.perm-matrix th.col-grant { text-align: center; }
.perm-matrix td.col-grant { text-align: center; }
.perm-matrix tbody tr:hover { background: var(--surface-2); }
.perm-matrix .perm-name { font-weight: 500; font-size: 13px; }
.perm-matrix .perm-key  { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); margin-top: 2px; }
.perm-matrix .perm-risk-high { color: var(--danger-2); }
.perm-matrix .perm-risk-med  { color: var(--warn-2); }
.perm-matrix .perm-risk-low  { color: var(--text-mute); }
.perm-cell {
  display: inline-flex;
  width: 28px; height: 28px;
  align-items: center; justify-content: center;
  border-radius: 6px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-mute);
  cursor: pointer;
  transition: all .12s;
}
.perm-cell:hover { border-color: var(--line-strong); background: var(--surface-2); }
.perm-cell.on {
  background: var(--accent-bg);
  border-color: oklch(0.6 0.1 var(--accent-h, 142) / 0.5);
  color: var(--accent-2);
}

/* ── Server hierarchy hint ────────────────────────────────────── */

.srv-hier {
  display: inline-flex; gap: 5px; align-items: center;
  font-size: 11px; color: var(--text-mute);
  font-family: var(--font-mono);
  margin-top: 2px;
}
.srv-hier .arrow { color: var(--text-faint); }

/* ── Login redesign ───────────────────────────────────────────── */

.login-wordmark {
  font-size: clamp(72px, 12vw, 148px);
  font-weight: 800;
  letter-spacing: -0.06em;
  line-height: 0.92;
  margin: 0 0 8px;
  font-feature-settings: "ss01" on, "cv11" on;
  background: linear-gradient(150deg, var(--accent-2) 0%, var(--accent) 60%, var(--text-dim) 130%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
}
.login-wordmark .dot {
  display: inline-block;
  width: 0.16em; height: 0.16em;
  border-radius: 50%;
  background: var(--accent);
  margin-left: 0.03em;
  margin-bottom: 0.02em;
  vertical-align: baseline;
  box-shadow: 0 0 30px var(--accent);
  -webkit-text-fill-color: initial;
}

.login-tagline {
  font-size: clamp(20px, 2.4vw, 28px);
  font-weight: 600;
  letter-spacing: -0.015em;
  margin: 24px 0 12px;
  color: var(--text);
  line-height: 1.2;
  max-width: 18ch;
}

.login-subline {
  color: var(--text-mute);
  font-size: 13.5px;
  line-height: 1.55;
  max-width: 40ch;
  margin: 0;
}

.login-spikes {
  display: flex; gap: 6px;
  margin-top: 32px;
  align-items: flex-end;
  opacity: 0.7;
}
.login-spikes i {
  display: block;
  width: 3px;
  border-radius: 2px;
  background: var(--accent);
}
.login-spikes i:nth-child(1) { height: 10px; background: var(--text-faint); }
.login-spikes i:nth-child(2) { height: 16px; background: var(--text-mute); }
.login-spikes i:nth-child(3) { height: 24px; background: var(--text-dim); }
.login-spikes i:nth-child(4) { height: 34px; }
.login-spikes i:nth-child(5) { height: 28px; }
.login-spikes i:nth-child(6) { height: 38px; background: var(--accent-2); }
.login-spikes i:nth-child(7) { height: 22px; }
.login-spikes i:nth-child(8) { height: 14px; background: var(--text-dim); }
.login-spikes i:nth-child(9) { height: 8px;  background: var(--text-faint); }

/* ── Permission tri-state ─────────────────────────────────────── */

.tri-seg {
  display: inline-flex;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 2px;
  gap: 1px;
}
.tri-seg button {
  padding: 5px 10px;
  background: transparent;
  border: 0; border-radius: 5px;
  color: var(--text-mute);
  font-size: 11.5px;
  font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.tri-seg button:hover { color: var(--text); }
.tri-seg button.on { color: var(--text); background: var(--surface-2); }
.tri-seg button.on.allow  { background: oklch(0.4 0.1 150 / 0.35); color: var(--ok-2); }
.tri-seg button.on.deny   { background: oklch(0.4 0.13 26 / 0.35); color: var(--danger-2); }
.tri-seg button.on.inherit { background: oklch(0.3 0.005 80); }

.tri-eff {
  font-size: 11px;
  color: var(--text-mute);
  font-family: var(--font-mono);
}
.tri-eff .pill-eff {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 7px;
  border-radius: 4px;
  font-weight: 600;
  font-family: var(--font-ui);
  font-size: 10.5px;
}
.tri-eff .pill-eff.allow  { color: var(--ok-2); background: oklch(0.35 0.08 150 / 0.3); }
.tri-eff .pill-eff.deny   { color: var(--danger-2); background: oklch(0.35 0.1 26 / 0.3); }

/* ── Role tabs ─────────────────────────────────────────────────── */

.role-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
  padding: 4px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow-x: auto;
}
.role-tabs button {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: transparent;
  border: 0; border-radius: 7px;
  color: var(--text-dim);
  font-size: 13px; font-weight: 500;
  flex-shrink: 0;
  transition: background .12s, color .12s;
}
.role-tabs button:hover { background: var(--surface-2); color: var(--text); }
.role-tabs button.on { background: var(--surface-2); color: var(--text); box-shadow: 0 0 0 1px var(--line-strong) inset; }
.role-tabs .pri {
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: var(--text-faint);
  padding: 1px 5px;
  background: var(--bg-2);
  border-radius: 3px;
}
.role-tabs button.on .pri { color: var(--accent-2); background: var(--accent-bg); }
.lang-seg {
  display: inline-flex;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 2px;
}
.lang-seg button {
  padding: 5px 10px;
  background: transparent;
  border: 0; border-radius: 6px;
  color: var(--text-dim); font-size: 12px;
  font-family: var(--font-mono);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.lang-seg button.on { background: var(--surface-2); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.3); }
</style>
