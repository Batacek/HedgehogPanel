<section class="card">
  <h1>Servers</h1>
  <div id="servers-status" role="status">Loading servers…</div>
  <ul id="servers-list" class="server-list" aria-live="polite"></ul>
</section>
<script>
(async function() {
  const statusEl = document.getElementById('servers-status');
  const listEl = document.getElementById('servers-list');

  function renderItem(srv) {
    const li = document.createElement('li');
    li.className = 'server-item';
    
    // Server main section
    const mainDiv = document.createElement('div');
    mainDiv.className = 'server-main';
    
    const nameStrong = document.createElement('strong');
    nameStrong.className = 'server-name';
    nameStrong.textContent = srv.name;
    
    const statusSpan = document.createElement('span');
    statusSpan.className = `server-status ${srv.status}`;
    statusSpan.textContent = srv.status;
    
    mainDiv.appendChild(nameStrong);
    mainDiv.appendChild(statusSpan);
    
    // Server meta section
    const metaDiv = document.createElement('div');
    metaDiv.className = 'server-meta';
    
    const ownerSpan = document.createElement('span');
    ownerSpan.title = 'Owner';
    ownerSpan.textContent = `👤 ${srv.owner}`;
    
    const roleSpan = document.createElement('span');
    roleSpan.title = 'Your role';
    roleSpan.textContent = `🔑 ${srv.role}`;
    
    metaDiv.appendChild(ownerSpan);
    metaDiv.appendChild(roleSpan);
    
    // Server actions section
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'server-actions';
    
    const openBtn = document.createElement('button');
    openBtn.type = 'button';
    openBtn.disabled = true;
    openBtn.title = 'Open (stub)';
    openBtn.textContent = 'Open';
    
    actionsDiv.appendChild(openBtn);
    
    // Assemble
    li.appendChild(mainDiv);
    li.appendChild(metaDiv);
    li.appendChild(actionsDiv);
    
    return li;
  }

  // Fetch with exponential backoff retry
  async function fetchWithRetry(url, options, maxRetries = 3, baseDelay = 1000) {
    let lastError;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res;
      } catch (err) {
        lastError = err;
        if (attempt < maxRetries) {
          const delay = baseDelay * Math.pow(2, attempt);
          console.warn(`Fetch attempt ${attempt + 1} failed, retrying in ${delay}ms...`, err);
          await new Promise(resolve => setTimeout(resolve, delay));
        }
      }
    }
    throw lastError;
  }

  try {
    const res = await fetchWithRetry('/api/servers', { credentials: 'same-origin', cache: 'no-cache' });
    const data = await res.json();
    listEl.innerHTML = '';
    if (Array.isArray(data) && data.length) {
      data.forEach(s => listEl.appendChild(renderItem(s)));
      statusEl.textContent = `${data.length} server(s)`;
    } else {
      statusEl.textContent = 'No servers to show.';
    }
  } catch (err) {
    console.error('Failed to load servers', err);
    statusEl.textContent = 'Failed to load servers.';
  }
})();
</script>
<style>
  /* Match dark theme palette and spacing */
  #servers-status { color: var(--muted); margin-top: 6px; }
  .server-list { list-style: none; padding: 0; margin: 0.5rem 0 0; display: grid; gap: 10px; }
  .server-item {
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-sm);
    background: linear-gradient(180deg, var(--panel-2), #1b1e23);
    display: grid;
    gap: 8px;
    box-shadow: var(--shadow);
  }
  .server-main { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .server-name { font-size: 1.06rem; }
  .server-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.75rem;
    text-transform: capitalize;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
  }
  .server-status.running {
    background: rgba(85,107,47,0.18);
    color: var(--mud-green-2);
    border-color: rgba(85,107,47,0.5);
  }
  .server-status.stopped {
    background: rgba(122,46,42,0.18);
    color: var(--accent-red-2);
    border-color: rgba(122,46,42,0.5);
  }
  .server-meta { color: var(--muted); display: flex; gap: 14px; font-size: 0.92rem; }
  .server-actions { margin-top: 4px; }
  .server-actions button {
    padding: 6px 10px;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
  }
</style>
