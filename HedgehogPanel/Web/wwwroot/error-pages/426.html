<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>426 · Upgrade Required · Hedgehog Panel</title>
  <link rel="stylesheet" href="/html/error-pages/css/error.css" />
  <style>
    :root { --err-accent: oklch(0.68 0.12 175); }

    /* 426 — an up-arrow climbing out of a ring: "you must upgrade" */
    .glyph-426 .ring {
      position: absolute; inset: 20px;
      border: 5px solid var(--err-accent);
      border-radius: 50%;
      background: color-mix(in oklab, var(--err-accent) 8%, transparent);
    }
    .glyph-426 .arrow { animation: up426 2.2s ease-in-out infinite; }
    .glyph-426 .shaft {
      position: absolute; left: 50%; top: 50px;
      transform: translateX(-50%);
      width: 7px; height: 30px;
      background: var(--err-accent);
      border-radius: 4px;
    }
    .glyph-426 .head {
      position: absolute; left: 50%; top: 34px;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 18px solid var(--err-accent);
    }
    @keyframes up426 {
      0%,100% { transform: translateY(4px); opacity: 0.85; }
      50% { transform: translateY(-4px); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="err-wrap">
    <section class="err-card" data-screen-label="426">
      <div class="err-brand">
        <div class="brand-logo" aria-hidden="true"></div>
        <div class="brand-title">Hedgehog Panel</div>
      </div>
      <div class="err-stage">
        <div class="glyph glyph-426" aria-hidden="true">
          <div class="ring"></div>
          <div class="arrow">
            <div class="head"></div>
            <div class="shaft"></div>
          </div>
        </div>
      </div>
      <div class="err-code">426</div>
      <h1 class="err-title">Upgrade required</h1>
      <p class="err-msg">Your client is using an outdated protocol. Upgrade to a newer version to continue.</p>
      <div class="err-actions">
        <a class="err-btn primary" href="/">Back to panel</a>
        <a class="err-btn" href="javascript:history.back()">Go back</a>
      </div>
      <div class="err-foot">Hedgehog Panel</div>
    </section>
  </main>
</body>
</html>
